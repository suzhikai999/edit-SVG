<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>edit-SVG</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Arial}
        .box{display:flex;flex-direction:column;height:100vh}
        .bar{padding:10px;background:#f5f5f5;border-bottom:1px solid #ddd;display:flex;gap:8px;align-items:center}
        .btn{padding:6px 14px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer}
        .btn.active{background:#4285f4;color:#fff;border-color:#3367d6}
        .canvas{flex:1;background:#fafafa}
        #svg{background:#fff;border:1px solid #ddd}
        .selected{stroke:#4285f4 !important;stroke-width:2 !important}
        .guide-line{stroke:#4285f4;stroke-dasharray:4;stroke-width:1;pointer-events:none}
        #selectionRect{fill:rgba(66,133,244,0.1);stroke:#4285f4;stroke-width:1;pointer-events:fill}
        .line-point{fill:#4285f4;r:5;display:block;pointer-events:auto}
        .line-point.unselected{fill:none}
        .lang-switch {margin-left: auto; padding: 6px 12px; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: pointer;}
    </style>
</head>
<body>
<div class="box">
    <div class="bar">
        <button class="btn" id="selBtn">选择</button>
        <button class="btn" id="lineBtn">直线</button>
        <button class="btn" id="circleBtn">圆形</button>
        <button class="btn" id="clearBtn">清空</button>
        <button class="btn" id="exportSvgBtn">导出SVG</button>
        <button class="btn" id="exportPngBtn">导出PNG</button>
        <button class="btn" id="copyLinkBtn">复制SVG链接</button>
        <button id="langBtn" class="lang-switch">English</button>
    </div>
    <div class="canvas">
        <svg id="svg" width="1400" height="800" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
</div>

<script>
const svg = document.getElementById('svg');
const selBtn = document.getElementById('selBtn');
const lineBtn = document.getElementById('lineBtn');
const circleBtn = document.getElementById('circleBtn');
const clearBtn = document.getElementById('clearBtn');
const exportSvgBtn = document.getElementById('exportSvgBtn');
const exportPngBtn = document.getElementById('exportPngBtn');
const copyLinkBtn = document.getElementById('copyLinkBtn');
const langBtn = document.getElementById('langBtn');

const translations = {
  zh: {
    select: "选择",
    line: "直线",
    circle: "圆形",
    clear: "清空",
    exportSvg: "导出SVG",
    exportPng: "导出PNG",
    copyLink: "复制SVG链接",
    switchToEnglish: "English",
    confirmClear: "确定清空画布?",
    copySuccess: "链接已复制！",
    copyFail: "复制失败：图形过大或浏览器限制"
  },
  en: {
    select: "Select",
    line: "Line",
    circle: "Circle",
    clear: "Clear",
    exportSvg: "Export SVG",
    exportPng: "Export PNG",
    copyLink: "Copy SVG Link",
    switchToChinese: "简体中文",
    confirmClear: "Clear all canvas?",
    copySuccess: "Link copied!",
    copyFail: "Copy failed: Image too large or browser restricted"
  }
};

// ==================== Cookie 工具函数 ====================
function setCookie(name, value, days = 30) {
  const d = new Date();
  d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
  document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/`;
}

function getCookie(name) {
  const c = document.cookie.split('; ').find(row => row.startsWith(name + '='));
  return c ? c.split('=')[1] : null;
}

// ==================== 语言切换逻辑 ====================
let currentLang = getCookie('lang') || 'zh';

function applyLanguage(lang) {
  const t = translations[lang];
  selBtn.textContent = t.select;
  lineBtn.textContent = t.line;
  circleBtn.textContent = t.circle;
  clearBtn.textContent = t.clear;
  exportSvgBtn.textContent = t.exportSvg;
  exportPngBtn.textContent = t.exportPng;
  copyLinkBtn.textContent = t.copyLink;
  langBtn.textContent = lang === 'zh' ? t.switchToEnglish : t.switchToChinese;
  document.documentElement.lang = lang;
  currentLang = lang;
  setCookie('lang', lang);
}

langBtn.addEventListener('click', () => {
  applyLanguage(currentLang === 'zh' ? 'en' : 'zh');
});

applyLanguage(currentLang);

exportSvgBtn.onclick = () => {
    const cloneSvg = svg.cloneNode(true);
    cloneSvg.querySelectorAll('.line-point,.guide-line,#selectionRect').forEach(el=>el.remove());
    const data = new XMLSerializer().serializeToString(cloneSvg);
    const blob = new Blob([data],{type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'drawing.svg';
    a.click();
    URL.revokeObjectURL(url);
};

exportPngBtn.onclick = () => {
  const svgData = new XMLSerializer().serializeToString(svg);
  const img = new Image();
  const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = svg.width.baseVal.value;
    canvas.height = svg.height.baseVal.value;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'drawing.png';
    a.click();
  };
  img.src = url;
};

copyLinkBtn.onclick = () => {
  const cloneSvg = svg.cloneNode(true);
  cloneSvg.querySelectorAll('.line-point,.guide-line,#selectionRect').forEach(el => el.remove());
  const svgStr = new XMLSerializer().serializeToString(cloneSvg);

  try {
    const encoded = encodeURIComponent(svgStr);
    const base = window.location.href.split('/').slice(0, -1).join('/') + '/';
    const url = base + `view-svg.html?svg=${encoded}`;

    navigator.clipboard.writeText(url).then(() => {
      alert(translations[currentLang].copySuccess);
    });
  } catch (e) {
    alert(translations[currentLang].copyFail);
  }
};

let tool = 'select';
let drawing = false;
let startP = {x:0,y:0};
let curEl = null;
let selected = [];
let isDragging = false;
let dragStart = {x:0,y:0};
let selectionRect = null;
const snapDist = 12;
let guideLines = [];
let isMouseDown=false;

document.addEventListener('keydown', (e) => {
    if (tool === 'select' && (e.key === 'Delete' || e.key === 'Backspace')) {
        const toRemove = new Set();
        selected.forEach(el => {
            toRemove.add(el);
            if (el.tagName === 'line') {
                const siblings = Array.from(el.parentNode.children);
                const idx = siblings.indexOf(el);
                if (idx >= 2) {
                    toRemove.add(siblings[idx - 1]);
                    toRemove.add(siblings[idx - 2]);
                }
            }
        });
        toRemove.forEach(item => item.remove());
        selected = [];
    }
});

document.addEventListener("mousedown",(e)=>{
    isMouseDown=true;
});
document.addEventListener("mouseup",(e)=>{
    isMouseDown=false;
});

[selBtn,lineBtn,circleBtn].forEach((btn,i)=>{
    btn.onclick=()=>{
        tool = ['select','line','circle'][i];
        document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        resetAll();
        if(tool!='select')removeSelectionRect(),clearSelection();
    }
});

clearBtn.onclick=()=>{
    if(confirm(translations[currentLang].confirmClear)){
        svg.innerHTML = '';
        clearSelection();
        removeSelectionRect();
    }
};

function resetAll(){
    drawing = false;
    curEl = null;
    clearGuides();
}

function getSVGPoint(e) {
    const pt = svg.createSVGPoint();
    pt.x = e.clientX;
    pt.y = e.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function clearSelection(){
    selected.forEach(el => {
        el.classList.remove('selected');
        if(el.classList.contains('line-point')) el.classList.add('unselected');
    });
    selected = [];
    removeSelectionRect();
}

function addToSelection(el){
    if(!el || el === svg) return;
    if(!selected.includes(el)){
        el.classList.add('selected');
        if(el.classList.contains('line-point')) el.classList.remove('unselected');
        selected.push(el);
    }
}

function createSelectionRect(p){
    removeSelectionRect();
    selectionRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    selectionRect.setAttribute("id", "selectionRect");
    selectionRect.setAttribute("x", p.x);
    selectionRect.setAttribute("y", p.y);
    selectionRect.setAttribute("width", 0);
    selectionRect.setAttribute("height", 0);
    svg.appendChild(selectionRect);
}

function updateSelectionRect(p){
    if(!selectionRect||!isMouseDown) return;
    const x = Math.min(startP.x, p.x);
    const y = Math.min(startP.y, p.y);
    const w = Math.abs(p.x - startP.x);
    const h = Math.abs(p.y - startP.y);
    selectionRect.setAttribute("x", x);
    selectionRect.setAttribute("y", y);
    selectionRect.setAttribute("width", w);
    selectionRect.setAttribute("height", h);
}

function removeSelectionRect(){
    if(selectionRect){
        selectionRect.remove();
        selectionRect = null;
    }
}
function selectElementsInRect(){
    if(!selectionRect) return;
    const rectBox = selectionRect.getBBox();
    const allEls = Array.from(svg.children);

    allEls.forEach(el => {
        if(el.classList.contains('guide-line') || el.id === 'selectionRect') return;
        if(el.classList.contains('line-point')){
            const cx = parseFloat(el.getAttribute('cx'));
            const cy = parseFloat(el.getAttribute('cy'));
            const r = 5;
            if(cx >= rectBox.x && cx <= rectBox.x + rectBox.width &&
               cy >= rectBox.y && cy <= rectBox.y + rectBox.height){
                addToSelection(el);
            }
            return;
        }
        if(el.tagName === 'line'){
            const x1 = parseFloat(el.getAttribute('x1'));
            const y1 = parseFloat(el.getAttribute('y1'));
            const x2 = parseFloat(el.getAttribute('x2'));
            const y2 = parseFloat(el.getAttribute('y2'));
            if(lineIntersectRect(x1,y1,x2,y2,rectBox)){
                addToSelection(el);
            }
            return;
        }
        const eb = el.getBBox();
        const overlap = !(
            rectBox.x + rectBox.width < eb.x ||
            rectBox.x > eb.x + eb.width ||
            rectBox.y + rectBox.height < eb.y ||
            rectBox.y > eb.y + eb.height
        );
        if(overlap) addToSelection(el);
    });
}
function lineIntersectRect(x1,y1,x2,y2,rect){
    const left = rect.x;
    const right = rect.x + rect.width;
    const top = rect.y;
    const bottom = rect.y + rect.height;
    const p1In = (x1>=left&&x1<=right&&y1>=top&&y1<=bottom);
    const p2In = (x2>=left&&x2<=right&&y2>=top&&y2<=bottom);
    if(p1In||p2In) return true;
    const l = [[left,top,right,top],[right,top,right,bottom],[right,bottom,left,bottom],[left,bottom,left,top]];
    for(let [a1,b1,a2,b2] of l){
        if(segCross(x1,y1,x2,y2,a1,b1,a2,b2)) return true;
    }
    return false;
}
function segCross(x1,y1,x2,y2,x3,y3,x4,y4){
    function ccw(ax,ay,bx,by,cx,cy){
        return (bx-ax)*(cy-ay)-(by-ay)*(cx-ax);
    }
    const c1 = ccw(x1,y1,x2,y2,x3,y3);
    const c2 = ccw(x1,y1,x2,y2,x4,y4);
    const c3 = ccw(x3,y3,x4,y4,x1,y1);
    const c4 = ccw(x3,y3,x4,y4,x2,y2);
    return (c1*c2<0) && (c3*c4<0);
}

function clearGuides(){
    guideLines.forEach(g=>g.remove());
    guideLines = [];
}

function addGuide(x1,y1,x2,y2){
    const g = document.createElementNS("http://www.w3.org/2000/svg", "line");
    g.setAttribute("class", "guide-line");
    g.setAttribute("x1", x1);
    g.setAttribute("y1", y1);
    g.setAttribute("x2", x2);
    g.setAttribute("y2", y2);
    svg.appendChild(g);
    guideLines.push(g);
}

function pointToLineSeg(px, py, x1, y1, x2, y2) {
    const A = px - x1;
    const B = py - y1;
    const C = x2 - x1;
    const D = y2 - y1;
    const dot = A * C + B * D;
    const lenSq = C * C + D * D;
    let t = lenSq === 0 ? 0 : dot / lenSq;
    t = Math.max(0, Math.min(1, t));
    const fx = x1 + t * C;
    const fy = y1 + t * D;
    return { dist: Math.hypot(px-fx, py-fy), x: fx, y: fy };
}

function pointToCircle(px, py, cx, cy, r) {
    const dx = px - cx;
    const dy = py - cy;
    const d = Math.hypot(dx, dy);
    if(d === 0) return { dist: r, x: cx + r, y: cy };
    const scale = r / d;
    return {
        dist: Math.abs(d - r),
        x: cx + dx * scale,
        y: cy + dy * scale
    };
}
function snapPoint(px, py) {
    let best = {x: px, y: py};
    let minDist = snapDist;
    svg.querySelectorAll("line, circle").forEach(el => {
        if(el === curEl) return;
        if(el.tagName === "line"){
            const l = pointToLineSeg(px, py, el.x1.baseVal.value, el.y1.baseVal.value, el.x2.baseVal.value, el.y2.baseVal.value);
            if(l.dist < minDist){
                minDist = l.dist;
                best = {x: l.x, y: l.y};
            }
        } else if(el.tagName === "circle"&&!el.classList.contains("line-point")){
            const c = pointToCircle(px, py, el.cx.baseVal.value, el.cy.baseVal.value, el.r.baseVal.value);
            if(c.dist < minDist){
                minDist = c.dist;
                best = {x: c.x, y: c.y};
            }
        }
    });
    return best;
}

function alignPoint(p, origin){
    clearGuides();
    let fp = {x:p.x, y:p.y};
    if(Math.abs(p.y - origin.y) < snapDist){
        fp.y = origin.y;
        addGuide(origin.x, origin.y, origin.x+(p.x-origin.x)*5, origin.y);
    }
    if(Math.abs(p.x - origin.x) < snapDist){
        fp.x = origin.x;
        addGuide(origin.x, origin.y, origin.x, origin.y+(p.y-origin.y)*5);
    }
    return fp;
}

function bindLineToPoints(line,p1,p2){
    function update(){
        line.setAttribute("x1",p1.getAttribute("cx"));
        line.setAttribute("y1",p1.getAttribute("cy"));
        line.setAttribute("x2",p2.getAttribute("cx"));
        line.setAttribute("y2",p2.getAttribute("cy"));
    }
    update();
    line.update = update;
}

svg.onmousedown = (e) => {
    const p = getSVGPoint(e);
    startP = p;
    dragStart = p;

    if(tool === 'select'){
        if(e.target === svg){
            if(!e.ctrlKey) clearSelection();
            createSelectionRect(p);
        } else {
            if(e.target.tagName === 'line'){
                let pts = [];
                let sibs = Array.from(e.target.parentNode.children);
                let idx = sibs.indexOf(e.target);
                if(idx-1 < sibs.length && sibs[idx-1].classList.contains('line-point'))addToSelection(sibs[idx-1]);
                if(idx-2 < sibs.length && sibs[idx-2].classList.contains('line-point'))addToSelection(sibs[idx-2]);
            }
            addToSelection(e.target);
            isDragging = true;
        }
    }

    if(tool === 'line'){
        drawing = true;
        const sp = snapPoint(p.x, p.y);
        startP = sp;
        let p1 = document.createElementNS("http://www.w3.org/2000/svg","circle");
        p1.setAttribute("class","line-point unselected");
        p1.setAttribute("cx",sp.x);
        p1.setAttribute("cy",sp.y);
        svg.appendChild(p1);

        let p2 = document.createElementNS("http://www.w3.org/2000/svg","circle");
        p2.setAttribute("class","line-point unselected");
        p2.setAttribute("cx",sp.x);
        p2.setAttribute("cy",sp.y);
        svg.appendChild(p2);

        let line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("stroke", "#000");
        line.setAttribute("stroke-width", "2");
        svg.appendChild(line);

        bindLineToPoints(line,p1,p2);
        curEl = line;
    }

    if(tool === 'circle'){
        drawing = true;
        const sp = snapPoint(p.x, p.y);
        startP = sp;
        curEl = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        curEl.setAttribute("cx", sp.x);
        curEl.setAttribute("cy", sp.y);
        curEl.setAttribute("r", 0);
        curEl.setAttribute("stroke", "#000");
        curEl.setAttribute("stroke-width", "2");
        curEl.setAttribute("fill", "none");
        svg.appendChild(curEl);
    }
};

svg.onmousemove = (e) => {
    const p = getSVGPoint(e);
    if(drawing && curEl){
        const sp = snapPoint(p.x, p.y);
        const fp = alignPoint(sp, startP);
        if(tool === 'line'){
            let pts = curEl.parentNode.querySelectorAll(".line-point");
            if(pts.length>=2){
                pts[pts.length-1].setAttribute("cx",fp.x);
                pts[pts.length-1].setAttribute("cy",fp.y);
                curEl.update();
            }
        }
        if(tool === 'circle'){
            const r = Math.hypot(fp.x - startP.x, fp.y - startP.y);
            curEl.setAttribute("r", r);
        }
    }
    if(tool === 'select' && selectionRect && !isDragging){
        updateSelectionRect(p);
    }
    if(tool === 'select' && isDragging && selected.length > 0){
        const dx = p.x - dragStart.x;
        const dy = p.y - dragStart.y;

        selected.forEach(el => {
            if(el.tagName === 'circle'){
                el.cx.baseVal.value += dx;
                el.cy.baseVal.value += dy;
            }
            if(el.tagName === 'rect'){
                el.x.baseVal.value += dx;
                el.y.baseVal.value += dy;
            }
            if(el.tagName === 'line'){
                el.update();
            }
        });

        dragStart = p;
    }
};

svg.onmouseup = () => {
    if(tool === 'select'){
        if(selectionRect&&!isDragging){
            selectElementsInRect();
        }
        isDragging = false;
    }

    drawing = false;
    curEl = null;
    clearGuides();
};

selBtn.click();
</script>
</body>
</html>
